<!DOCTYPE html>

<html class="light" lang="en"><head>

                    "surface-bright": "#fff8f6",
                    "on-background": "#2c160e",
                    "primary": "#271310",

                    "error": "#ba1a1a",

            },
            "borderRadius": {

        },
      }

<style>
        body {
            background-color: #fff8f6;
            color: #2c160e;
            overflow-x: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
        .steam-particle {
            position: absolute;
            bottom: 25%;
            left: 50%;
            width: 8px;
            height: 8px;
            background: rgba(130, 116, 114, 0.2);
            border-radius: 50%;
            filter: blur(4px);
            animation: rise 3s infinite ease-out;
            opacity: 0;
        }
        @keyframes rise {
            0% { transform: translateY(0) translateX(-50%) scale(1); opacity: 0; }
            20% { opacity: 0.4; }
            100% { transform: translateY(-60px) translateX(calc(-50% + 20px)) scale(2.5); opacity: 0; }
        }
        .floating {
            animation: floating 4s ease-in-out infinite;
        }
        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body class="flex flex-col min-h-screen items-center justify-center p-grid-gutter font-body-md text-body-md">
<!-- Atmospheric Background Element -->
<div class="fixed inset-0 pointer-events-none z-0 opacity-10">
<div class="absolute -top-20 -right-20 w-64 md:w-96 h-64 md:h-96 bg-primary-fixed rounded-full blur-3xl"></div>
<div class="absolute -bottom-20 -left-20 w-64 md:w-96 h-64 md:h-96 bg-surface-container rounded-full blur-3xl"></div>
</div>
<!-- Main Content Container -->
<main class="relative z-10 flex flex-col items-center max-w-lg w-full text-center space-y-md md:space-y-lg">
<!-- Error Illustration Area -->
<div class="relative w-48 h-48 md:w-64 md:h-64 flex items-center justify-center bg-surface-container rounded-full shadow-sm floating">
<!-- Icon Shell -->
<div class="relative">
<span class="material-symbols-outlined text-[80px] md:text-[120px] text-primary" data-icon="coffee">coffee</span>
<!-- Cross symbol to indicate error/empty -->
<div class="absolute top-1 right-1 md:top-2 md:right-2 bg-error text-on-error w-8 h-8 md:w-10 md:h-10 rounded-full flex items-center justify-center shadow-md">
<span class="material-symbols-outlined text-label-lg md:text-headline-md" data-icon="close">close</span>
</div>
</div>
<!-- Steam Particles (Animated) -->
<div class="steam-particle" style="animation-delay: 0s;"></div>
<div class="steam-particle" style="animation-delay: 0.8s; left: 45%;"></div>
<div class="steam-particle" style="animation-delay: 1.6s; left: 55%;"></div>
</div>
<!-- Typography Cluster -->
<div class="space-y-xs md:space-y-sm px-4">
<h1 class="font-display-lg text-headline-lg md:text-display-lg text-primary">
                404
            </h1>
<h2 class="font-headline-md md:font-headline-lg text-headline-md md:text-headline-lg text-on-surface">
                Grounds for concern?
            </h2>
<p class="text-on-surface-variant font-body-md md:font-body-lg text-body-md md:text-body-lg max-w-sm mx-auto">
                The page you’re looking for has been moved or is currently out of stock. Let’s get you back to the bar.
            </p>
</div>
<!-- Action Area -->
<div class="flex flex-col sm:flex-row gap-base w-full max-w-md pt-base md:pt-md px-4">
<a class="flex-1 flex items-center justify-center gap-2 min-h-[56px] md:h-pos-touch-target rounded-xl border-2 border-secondary text-secondary font-label-lg text-label-lg hover:bg-secondary-container transition-colors active:scale-95 duration-150" href="#" onclick="window.history.back()">
<span class="material-symbols-outlined text-body-md" data-icon="arrow_back">arrow_back</span>
                Go Back
            </a>
<a class="flex-1 flex items-center justify-center gap-2 min-h-[56px] md:h-pos-touch-target rounded-xl bg-primary-container text-on-primary-container font-label-lg text-label-lg hover:brightness-110 shadow-lg shadow-[rgba(62,39,35,0.08)] transition-all active:scale-95 duration-150" href="/">
<span class="material-symbols-outlined text-body-md" data-icon="dashboard">dashboard</span>
                Dashboard
            </a>
</div>
<!-- System Branding Anchor -->
<div class="pt-md md:pt-lg flex items-center gap-2 opacity-60">
<span class="material-symbols-outlined text-primary" data-icon="restaurant">restaurant</span>
<span class="font-headline-md text-headline-md font-bold text-primary tracking-tight">Civet Cafe POS</span>
</div>
</main>
<!-- Visual Polish: Soft Grain Overlay -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] bg-[url('https://www.transparenttextures.com/patterns/p6.png')]"></div>
<script>
        // Simple micro-interaction for the primary button
        const mainBtn = document.querySelector('.bg-primary-container');
        if(mainBtn) {
            mainBtn.addEventListener('mouseenter', () => {
                const icon = mainBtn.querySelector('.material-symbols-outlined');
                icon.style.transform = 'rotate(10deg) scale(1.1)';
                icon.style.transition = 'transform 0.2s ease-out';
            });
            mainBtn.addEventListener('mouseleave', () => {
                const icon = mainBtn.querySelector('.material-symbols-outlined');
                icon.style.transform = 'rotate(0) scale(1)';
            });
        }
    </script>
</body></html>
